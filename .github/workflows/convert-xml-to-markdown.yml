name: Convert XML to Markdown

on:
  push:
    branches:
      - main
    paths:
      - 'letters/**/*.xml'
      - 'templates/transform.xsl'
  pull_request:
    branches:
      - main
    paths:
      - 'letters/**/*.xml'
      - 'templates/transform.xsl'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Download and Extract Jing
        run: |
          wget https://github.com/relaxng/jing-trang/releases/download/V20220510/jing-20220510.zip
          unzip jing-20220510.zip
          mkdir -p jing/bin
          cp jing-20220510/bin/jing.jar jing/bin/

      - name: Download TEI Schema (tei_all.rng)
        run: |
          mkdir -p schemas
          wget -O schemas/tei_all.rng https://tei-c.org/release/xml/tei/custom/schema/relaxng/tei_all.rng

      - name: Validate TEI Files in letters/
        run: |
          XML_FILES=$(find ./letters -type f -name "*.xml")
          if [ -n "$XML_FILES" ]; then
            echo "Validating TEI files in the letters folder..."
            find ./letters -type f -name "*.xml" -exec java -jar ./jing/bin/jing.jar schemas/tei_all.rng {} +
          else
            echo "No XML files found in the letters folder."
          fi

  convert:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout TEI repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"

      - name: Checkout Frontend Repo (Docusaurus)
        uses: actions/checkout@v4
        with:
          repository: Pantagrueliste/CavrianaCorr_FrontEnd
          path: CavrianaCorr_FrontEnd
          token: ${{ secrets.DOCUSAURUS_REPO_SECRET }}

      - name: Download Saxon
        run: |
          wget -O saxon.jar https://repo1.maven.org/maven2/net/sf/saxon/Saxon-HE/10.6/Saxon-HE-10.6.jar

      - name: Create docs folder
        run: mkdir -p CavrianaCorr_FrontEnd/docs

      - name: Convert XML to Markdown by Year
        run: |
          set -e
          for file in letters/*.xml; do
            if [[ "$file" != "letters/persNames.xml" && "$file" != "letters/placeNames.xml" ]]; then
              if [ -f "$file" ]; then
                # Skip placeholder files (metadata only, no transcription)
                if grep -q 'revisionDesc.*status="placeholder"' "$file"; then
                  echo "Skipping placeholder: $file"
                  continue
                fi
                echo "Processing $file"
                filename=$(basename "$file" .xml)
                filepath=$(realpath "$file")
                fileurl="file://$filepath"
                
                yearRaw=$(
                  java -cp saxon.jar net.sf.saxon.Query \
                    -qs:"declare namespace tei='http://www.tei-c.org/ns/1.0'; let \$d := doc('$fileurl')//tei:correspAction[@type='sent']/tei:date let \$v := if (\$d/@when) then string(\$d/@when) else if (\$d/@notBefore) then string(\$d/@notBefore) else '' return normalize-space(substring(\$v, 1, 4))" \
                    | grep -o '[0-9]\{4\}' || echo "unknownYear"
                )
                
                year=${yearRaw:-unknownYear}
                yearDir="CavrianaCorr_FrontEnd/docs/$year"
                mkdir -p "$yearDir"
                output_file="$yearDir/${filename}.md"
                echo "Converting $file -> $output_file (year=$year)"
                java -cp saxon.jar net.sf.saxon.Transform -s:"$file" -xsl:"templates/transform.xsl" -o:"$output_file"
              fi
            fi
          done

      - name: List generated docs
        run: ls -la CavrianaCorr_FrontEnd/docs

      - name: Commit and push changes
        if: github.event_name == 'push'
        run: |
          cd CavrianaCorr_FrontEnd
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          if ! git diff --cached --quiet; then
            git commit -m "Update converted Markdown files"
            for i in 1 2 3; do
              git pull --rebase origin main && \
              git push origin main && break || sleep 5
            done
          fi
